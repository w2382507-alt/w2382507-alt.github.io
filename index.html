<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理科学习笔记 + 思维导图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 250px;
            background-color: #2e3440;
            color: #eceff4;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #4c566a;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            padding: 10px;
            margin-bottom: 8px;
            background-color: #3b4252;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }

        .note-item:hover {
            background-color: #4c566a;
        }

        .note-item.active {
            background-color: #5e81ac;
        }

        .add-note-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #5e81ac;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .add-note-btn:hover {
            background-color: #81a1c1;
        }

        /* 主内容区样式 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        .content-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #5e81ac;
            color: white;
        }

        .btn-primary:hover {
            background-color: #81a1c1;
        }

        .btn-danger {
            background-color: #bf616a;
            color: white;
        }

        .btn-danger:hover {
            background-color: #d08770;
        }

        /* 笔记编辑区样式 */
        .note-editor {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            min-height: 200px;
            font-family: inherit;
        }

        /* 思维导图容器样式 */
        .mindmap-container {
            flex: 1;
            position: relative;
            background-color: #f7f7f7;
            border-top: 1px solid #e0e0e0;
        }

        #mindmap {
            width: 100%;
            height: 100%;
        }

        /* 超链接样式 */
        .reference-link {
            color: #5e81ac;
            text-decoration: none;
            cursor: pointer;
        }

        .reference-link:hover {
            text-decoration: underline;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 4px;
            width: 80%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h1>理科学习笔记</h1>
            <ul class="note-list" id="noteList"></ul>
            <button class="add-note-btn" onclick="addNewNote()">添加新笔记</button>
            <button class="add-note-btn" onclick="console.log('Add folder button clicked'); addNewFolder()">添加文件夹</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title" id="contentTitle">选择笔记</h2>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="generateMindmap()">生成思维导图</button>
                    <button class="btn btn-primary" onclick="exportNotes()">导出笔记</button>
                    <button class="btn btn-primary" onclick="importNotes()">导入笔记</button>
                    <button class="btn btn-danger" onclick="deleteCurrentNote()">删除笔记</button>
                </div>
            </div>

            <!-- 笔记编辑区 -->
            <div class="note-editor" id="noteEditor">
                <div id="emptyNoteMessage" style="display: flex; justify-content: center; align-items: center; height: 100%; font-size: 18px; color: #999;">
                    请选择笔记
                </div>
                <div id="noteForm" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="theoremName">定理/公理名称 *</label>
                        <input type="text" class="form-input" id="theoremName" placeholder="请输入定理/公理名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="proofProcess">证明过程 *</label>
                        <textarea class="form-textarea" id="proofProcess" placeholder="请输入证明过程"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="references">引用的其他定理（用逗号分隔）</label>
                        <input type="text" class="form-input" id="references" placeholder="例如：勾股定理, 三角形内角和定理">
                    </div>
                </div>
            </div>

            <!-- 思维导图容器 -->
            <div class="mindmap-container" id="mindmapContainer" style="display: none;">
                <div id="mindmap"></div>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">确认删除</h3>
                <button class="close-btn" onclick="closeDeleteModal()">&times;</button>
            </div>
            <p>确定要删除当前笔记吗？此操作不可恢复。</p>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDeleteNote()">删除</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>
        // 笔记和文件夹数据存储
        let notes = [];
        let folders = [];
        let currentNoteId = null;
        let mindmapSvg = null;

        // 初始化应用
        function initApp() {
            // 初始化 GitHub Token
            initGitHubToken();
            loadNotes();
            renderNoteList();
            setupEventListeners();
        }

        // 从本地存储加载笔记和文件夹
        function loadNotes() {
            const storedNotes = localStorage.getItem('scienceNotes');
            const storedFolders = localStorage.getItem('scienceFolders');
            if (storedNotes) {
                console.log('Loaded from localStorage:', storedNotes);
                const parsedData = JSON.parse(storedNotes);
                console.log('Parsed data:', parsedData);
                // 处理不同的数据格式
                if (Array.isArray(parsedData)) {
                    notes = parsedData;
                } else if (parsedData.notes) {
                    notes = parsedData.notes;
                    // 如果数据中包含folders，也一并加载
                    if (parsedData.folders) {
                        folders = parsedData.folders;
                    }
                } else {
                    notes = [];
                }
                console.log('Final notes:', notes);
            }
            if (storedFolders && !folders.length) {
                console.log('Loaded folders from localStorage:', storedFolders);
                folders = JSON.parse(storedFolders);
                console.log('Parsed folders:', folders);
            }
        }

        // 保存笔记和文件夹到本地存储
        function saveNotes() {
            localStorage.setItem('scienceNotes', JSON.stringify(notes));
            localStorage.setItem('scienceFolders', JSON.stringify(folders));
        }

        // 渲染笔记列表
        function renderNoteList() {
            const noteList = document.getElementById('noteList');
            noteList.innerHTML = '';

            // 渲染根目录下的文件夹
            folders.filter(folder => !folder.parentId).forEach(folder => {
                renderFolder(noteList, folder, 0);
            });

            // 添加根目录拖放区域
            const rootDropArea = document.createElement('li');
            rootDropArea.style.marginTop = '20px';
            rootDropArea.style.marginBottom = '10px';
            rootDropArea.style.fontSize = '12px';
            rootDropArea.style.color = '#81a1c1';
            rootDropArea.style.fontWeight = '500';
            rootDropArea.style.padding = '10px 5px';
            rootDropArea.style.border = '2px dashed #4c566a';
            rootDropArea.style.borderRadius = '4px';
            rootDropArea.style.textAlign = 'center';
            rootDropArea.textContent = '根目录 - 拖放内容到此处';
            rootDropArea.ondragover = (e) => dragOver(e);
            rootDropArea.ondrop = (e) => drop(e, 'root', null);
            noteList.appendChild(rootDropArea);

            // 渲染根目录下的笔记
            const rootNotes = notes.filter(note => !note.folderId);
            if (rootNotes.length > 0) {
                rootNotes.forEach(note => {
                    const li = document.createElement('li');
                    li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                    li.textContent = note.name;
                    li.onclick = () => selectNote(note.id);
                    li.draggable = true;
                    li.ondragstart = (e) => dragStart(e, 'note', note.id);
                    noteList.appendChild(li);
                });
            }
        }

        // 递归渲染文件夹
        function renderFolder(parent, folder, level) {
            const folderItem = document.createElement('li');
            folderItem.className = 'folder-item';
            folderItem.style.paddingLeft = `${level * 20}px`;
            folderItem.style.cursor = 'pointer';
            folderItem.style.marginBottom = '5px';
            folderItem.innerHTML = `📁 ${folder.name} <button style="margin-left: 10px; padding: 2px 6px; font-size: 10px; background-color: #bf616a; color: white; border: none; border-radius: 3px; cursor: pointer;" onclick="deleteFolder('${folder.id}')">删除</button>`;
            folderItem.ondblclick = () => renameFolder(folder.id);
            folderItem.draggable = true;
            folderItem.ondragstart = (e) => dragStart(e, 'folder', folder.id);
            folderItem.ondragover = (e) => dragOver(e);
            folderItem.ondrop = (e) => drop(e, 'folder', folder.id);
            parent.appendChild(folderItem);

            // 渲染文件夹内的子文件夹
            folders.filter(subFolder => subFolder.parentId === folder.id).forEach(subFolder => {
                renderFolder(parent, subFolder, level + 1);
            });

            // 渲染文件夹内的笔记
            notes.filter(note => note.folderId === folder.id).forEach(note => {
                const li = document.createElement('li');
                li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                li.style.paddingLeft = `${(level + 1) * 30}px`;
                
                // 根据层级设置不同的样式
                if (level === 0) {
                    li.style.backgroundColor = '#3b4252';
                    li.style.borderLeft = '4px solid #5e81ac';
                } else if (level === 1) {
                    li.style.backgroundColor = '#434c5e';
                    li.style.borderLeft = '4px solid #81a1c1';
                } else if (level === 2) {
                    li.style.backgroundColor = '#4c566a';
                    li.style.borderLeft = '4px solid #88c0d0';
                }
                
                li.textContent = note.name;
                li.onclick = () => selectNote(note.id);
                li.draggable = true;
                li.ondragstart = (e) => dragStart(e, 'note', note.id);
                parent.appendChild(li);
            });
        }

        // 选择笔记
        function selectNote(noteId) {
            currentNoteId = noteId;
            const note = notes.find(n => n.id === noteId);
            if (note) {
                document.getElementById('contentTitle').textContent = note.name;
                document.getElementById('theoremName').value = note.name;
                document.getElementById('proofProcess').value = note.proof;
                document.getElementById('references').value = note.references.join(', ');
                // 显示表单，隐藏提示信息
                document.getElementById('emptyNoteMessage').style.display = 'none';
                document.getElementById('noteForm').style.display = 'block';
                renderNoteList();
                showEditor();
            }
        }

        // 添加新笔记
        function addNewNote() {
            const newNote = {
                id: Date.now().toString(),
                name: '新定理',
                proof: '',
                references: [],
                folderId: null
            };
            notes.push(newNote);
            saveNotes();
            // 显示表单，隐藏提示信息
            document.getElementById('emptyNoteMessage').style.display = 'none';
            document.getElementById('noteForm').style.display = 'block';
            selectNote(newNote.id);
        }

        // 添加新文件夹
        function addNewFolder() {
            console.log('addNewFolder function called');
            const folderName = prompt('请输入文件夹名称：');
            console.log('Folder name entered:', folderName);
            if (folderName && folderName.trim()) {
                const newFolder = {
                    id: Date.now().toString(),
                    name: folderName.trim(),
                    parentId: null
                };
                console.log('Creating new folder:', newFolder);
                folders.push(newFolder);
                console.log('Folders array after addition:', folders);
                saveNotes();
                console.log('Notes saved');
                renderNoteList();
                console.log('Note list rendered');
            } else {
                console.log('No folder name entered or empty');
            }
        }

        // 重命名文件夹
        function renameFolder(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) {
                const newName = prompt('请输入新的文件夹名称：', folder.name);
                if (newName && newName.trim()) {
                    folder.name = newName.trim();
                    saveNotes();
                    renderNoteList();
                }
            }
        }

        // 删除文件夹
        function deleteFolder(folderId) {
            if (confirm('确定要删除此文件夹吗？文件夹内的内容将移到根目录。')) {
                // 将文件夹内的笔记移到根目录
                notes.forEach(note => {
                    if (note.folderId === folderId) {
                        note.folderId = null;
                    }
                });
                
                // 将子文件夹移到根目录
                folders.forEach(subFolder => {
                    if (subFolder.parentId === folderId) {
                        subFolder.parentId = null;
                    }
                });
                
                // 删除文件夹
                folders = folders.filter(folder => folder.id !== folderId);
                
                saveNotes();
                renderNoteList();
            }
        }

        // 删除当前笔记
        function deleteCurrentNote() {
            if (currentNoteId) {
                document.getElementById('deleteModal').style.display = 'block';
            }
        }

        // 确认删除笔记
        function confirmDeleteNote() {
            if (currentNoteId) {
                notes = notes.filter(note => note.id !== currentNoteId);
                saveNotes();
                currentNoteId = null;
                document.getElementById('contentTitle').textContent = '选择笔记';
                document.getElementById('theoremName').value = '';
                document.getElementById('proofProcess').value = '';
                document.getElementById('references').value = '';
                // 显示提示信息，隐藏表单
                document.getElementById('emptyNoteMessage').style.display = 'flex';
                document.getElementById('noteForm').style.display = 'none';
                renderNoteList();
                closeDeleteModal();
            }
        }

        // 关闭删除模态框
        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }

        // 生成思维导图
        function generateMindmap() {
            showMindmap();
            drawMindmap();
        }

        // 显示编辑区
        function showEditor() {
            document.getElementById('noteEditor').style.display = 'block';
            document.getElementById('mindmapContainer').style.display = 'none';
        }

        // 显示思维导图
        function showMindmap() {
            document.getElementById('noteEditor').style.display = 'none';
            document.getElementById('mindmapContainer').style.display = 'block';
        }

        // 绘制思维导图
        function drawMindmap() {
            const container = document.getElementById('mindmap');
            container.innerHTML = '';

            // 计算节点层级
            const nodeLevels = calculateNodeLevels();
            const maxLevel = Math.max(...Object.values(nodeLevels));

            // 设置画布尺寸
            const width = container.clientWidth;
            const height = container.clientHeight;
            const nodeWidth = 120;
            const nodeHeight = 60;
            const levelHeight = height / (maxLevel + 2);

            // 创建SVG
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            mindmapSvg = d3.select('#mindmap')
                .append('svg')
                .attr('width', width)
                .attr('height', height)
                .call(zoom);

            // 创建一个g元素用于缩放
            const g = mindmapSvg.append('g');

            // 计算每个层级的节点位置
            const levelNodes = {};
            Object.entries(nodeLevels).forEach(([nodeId, level]) => {
                if (!levelNodes[level]) {
                    levelNodes[level] = [];
                }
                levelNodes[level].push(nodeId);
            });

            // 优化节点布局，减少连线重叠
            const optimizedPositions = optimizeNodePositions(levelNodes, nodeLevels);

            // 存储节点位置
            const nodePositions = {};

            // 绘制节点 - 忽略文件夹结构，显示所有笔记
            notes.forEach(note => {
                const nodeId = note.id;
                const level = nodeLevels[note.id];
                const position = optimizedPositions[nodeId];
                const x = position.x;
                // 调整Y坐标，使基础公理在底部，复杂定理在上方
                const y = height - (level * levelHeight + levelHeight / 2);

                // 存储节点位置
                nodePositions[nodeId] = { x, y };

                // 创建节点组
                const nodeGroup = g.append('g')
                    .attr('class', 'mindmap-node')
                    .datum(nodeId)
                    .attr('transform', `translate(${x}, ${y})`)
                    .call(d3.drag()
                        .on('start', dragstarted)
                        .on('drag', dragged)
                        .on('end', dragended));

                // 节点背景 - 更接近Obsidian风格
                nodeGroup.append('rect')
                    .attr('x', -nodeWidth / 2)
                    .attr('y', -nodeHeight / 2)
                    .attr('width', nodeWidth)
                    .attr('height', nodeHeight)
                    .attr('rx', 6)
                    .attr('ry', 6)
                    .attr('fill', '#3b4252')
                    .attr('stroke', '#5e81ac')
                    .attr('stroke-width', 1.5);

                // 节点文本 - 确保正确显示
                nodeGroup.append('text')
                    .attr('x', 0)
                    .attr('y', 0)
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'middle')
                    .attr('fill', '#eceff4')
                    .attr('font-size', '12px')
                    .attr('font-weight', '500')
                    .text(note.name)
                    .call(wrapText, nodeWidth - 20);

                // 添加点击事件
                nodeGroup.append('rect')
                    .attr('x', -nodeWidth / 2)
                    .attr('y', -nodeHeight / 2)
                    .attr('width', nodeWidth)
                    .attr('height', nodeHeight)
                    .attr('fill', 'transparent')
                    .style('cursor', 'pointer')
                    .on('click', () => selectNote(nodeId));
            });

            // 绘制连接线（在节点下方）
            notes.forEach(note => {
                const sourceId = note.id;
                const sourceLevel = nodeLevels[sourceId];
                const sourcePosition = optimizedPositions[sourceId];
                const sourceX = sourcePosition.x;
                // 调整Y坐标，使基础公理在底部，复杂定理在上方
                const sourceY = height - (sourceLevel * levelHeight + levelHeight / 2);

                note.references.forEach(refName => {
                    const targetNote = notes.find(n => n.name === refName);
                    if (targetNote) {
                        const targetId = targetNote.id;
                        const targetLevel = nodeLevels[targetId];
                        const targetPosition = optimizedPositions[targetId];
                        const targetX = targetPosition.x;
                        // 调整Y坐标，使基础公理在底部，复杂定理在上方
                        const targetY = height - (targetLevel * levelHeight + levelHeight / 2);

                        // 使用曲线连接，更接近Obsidian风格，添加箭头
                        // 方向：由被引用指向引用（从target到source）
                        g.append('path')
                            .attr('d', `M ${targetX} ${targetY} C ${targetX} ${(sourceY + targetY) / 2}, ${sourceX} ${(sourceY + targetY) / 2}, ${sourceX} ${sourceY}`)
                            .attr('stroke', '#999')
                            .attr('stroke-width', 1.5)
                            .attr('fill', 'none')
                            .attr('class', 'mindmap-link')
                            .attr('marker-end', 'url(#arrowhead)');
                    }
                });
            });

            // 拖拽函数
            function dragstarted(event, d) {
                d3.select(this).raise();
                // 只修改节点背景矩形的stroke属性
                d3.select(this).select('rect:first-child').attr('stroke', '#ff0000');
            }

            function dragged(event, d) {
                d3.select(this).attr('transform', `translate(${event.x}, ${event.y})`);
                // 更新连接线
                updateLinks();
            }

            function dragended(event, d) {
                // 只修改节点背景矩形的stroke属性
                d3.select(this).select('rect:first-child').attr('stroke', '#5e81ac');
                // 保存新位置
                const nodeId = d3.select(this).datum();
                if (nodeId) {
                    nodePositions[nodeId] = { x: event.x, y: event.y };
                }
            }

            // 优化节点布局，减少连线重叠
            function optimizeNodePositions(levelNodes, nodeLevels) {
                const positions = {};
                const levels = Object.keys(levelNodes).map(Number).sort((a, b) => a - b);
                
                // 从底层开始，逐层计算位置
                levels.forEach(level => {
                    const nodes = levelNodes[level];
                    const levelWidth = width / nodes.length;
                    
                    nodes.forEach((nodeId, index) => {
                        const note = notes.find(n => n.id === nodeId);
                        if (!note) return;
                        
                        // 计算引用节点的平均位置
                        let refXSum = 0;
                        let refCount = 0;
                        
                        note.references.forEach(refName => {
                            const refNote = notes.find(n => n.name === refName);
                            if (refNote && positions[refNote.id]) {
                                refXSum += positions[refNote.id].x;
                                refCount++;
                            }
                        });
                        
                        let x;
                        if (refCount > 0) {
                            // 如果有引用节点，尽量靠近引用节点的平均位置
                            x = refXSum / refCount;
                            // 调整位置，确保在当前层级内
                            const minX = index * levelWidth;
                            const maxX = (index + 1) * levelWidth;
                            x = Math.max(minX, Math.min(maxX, x));
                        } else {
                            // 如果没有引用节点，使用默认位置
                            x = (index + 0.5) * levelWidth;
                        }
                        
                        positions[nodeId] = { x };
                    });
                });
                
                return positions;
            }

            // 确保箭头标记只创建一次
            if (g.select('#arrowhead').empty()) {
                g.append('defs').append('marker')
                    .attr('id', 'arrowhead')
                    .attr('viewBox', '-0 -5 10 10')
                    .attr('refX', 20)
                    .attr('refY', 0)
                    .attr('orient', 'auto')
                    .attr('markerWidth', 6)
                    .attr('markerHeight', 6)
                    .attr('xoverflow', 'visible')
                    .append('svg:path')
                    .attr('d', 'M 0,-5 L 10 ,0 L 0,5')
                    .attr('fill', '#999')
                    .style('stroke', 'none');
            }

            // 更新连接线
            function updateLinks() {
                // 移除旧的连接线
                g.selectAll('.mindmap-link').remove();
                
                // 重新绘制连接线
                notes.forEach(note => {
                    const sourceGroup = g.selectAll('.mindmap-node').filter(function() {
                        return d3.select(this).datum() === note.id;
                    });
                    
                    if (sourceGroup.size() > 0) {
                        const sourceTransform = sourceGroup.attr('transform');
                        const sourceX = parseFloat(sourceTransform.split(',')[0].replace('translate(', ''));
                        const sourceY = parseFloat(sourceTransform.split(',')[1].replace(')', ''));

                        note.references.forEach(refName => {
                            const targetNote = notes.find(n => n.name === refName);
                            if (targetNote) {
                                const targetGroup = g.selectAll('.mindmap-node').filter(function() {
                                    return d3.select(this).datum() === targetNote.id;
                                });
                                
                                if (targetGroup.size() > 0) {
                                    const targetTransform = targetGroup.attr('transform');
                                    const targetX = parseFloat(targetTransform.split(',')[0].replace('translate(', ''));
                                    const targetY = parseFloat(targetTransform.split(',')[1].replace(')', ''));

                                    // 使用曲线连接，更接近Obsidian风格，添加箭头
                                    // 方向：由被引用指向引用（从target到source）
                                    g.append('path')
                                        .attr('d', `M ${targetX} ${targetY} C ${targetX} ${(sourceY + targetY) / 2}, ${sourceX} ${(sourceY + targetY) / 2}, ${sourceX} ${sourceY}`)
                                        .attr('stroke', '#999')
                                        .attr('stroke-width', 1.5)
                                        .attr('fill', 'none')
                                        .attr('class', 'mindmap-link')
                                        .attr('marker-end', 'url(#arrowhead)');
                                }
                            }
                        });
                    }
                });
            }
        }

        // 计算节点层级
        function calculateNodeLevels() {
            const levels = {};
            const visited = new Set();
            const processing = new Set();

            // 递归计算层级
            function calculateLevel(noteId) {
                if (visited.has(noteId)) {
                    return levels[noteId];
                }
                if (processing.has(noteId)) {
                    // 检测到循环引用，返回当前最小可能层级
                    return 1;
                }

                const note = notes.find(n => n.id === noteId);
                if (!note) return 0;

                processing.add(noteId);
                
                let maxChildLevel = 0;
                console.log('Processing note:', note.name, 'with references:', note.references);
                note.references.forEach(refName => {
                    const refNote = notes.find(n => n.name === refName);
                    console.log('Looking for ref:', refName, 'found:', refNote ? refNote.name : 'not found');
                    if (refNote) {
                        const childLevel = calculateLevel(refNote.id);
                        console.log('Child level for', refName, 'is', childLevel);
                        maxChildLevel = Math.max(maxChildLevel, childLevel);
                    }
                });

                levels[noteId] = maxChildLevel + 1;
                console.log('Level for', note.name, 'is', levels[noteId]);
                processing.delete(noteId);
                visited.add(noteId);
                return levels[noteId];
            }

            // 计算所有节点的层级
            notes.forEach(note => {
                if (!visited.has(note.id)) {
                    calculateLevel(note.id);
                }
            });

            console.log('Final node levels:', levels);
            return levels;
        }

        // 文本换行
        function wrapText(text, width) {
            text.each(function() {
                const text = d3.select(this);
                const words = text.text().split(/\s+/).reverse();
                let word;
                let line = [];
                let lineNumber = 0;
                const lineHeight = 1.2;
                const y = text.attr('y');
                const x = text.attr('x'); // 获取父元素的x坐标
                const dy = parseFloat(text.attr('dy') || 0);
                let tspan = text.text(null).append('tspan').attr('x', x).attr('y', y).attr('dy', dy + 'em');

                while (word = words.pop()) {
                    line.push(word);
                    tspan.text(line.join(' '));
                    if (tspan.node().getComputedTextLength() > width) {
                        line.pop();
                        tspan.text(line.join(' '));
                        line = [word];
                        tspan = text.append('tspan').attr('x', x).attr('y', y).attr('dy', ++lineNumber * lineHeight + dy + 'em').text(word);
                    }
                }
            });
        }

            e.preventDefault();

        function drop(e, targetType, targetId) {
            e.preventDefault();
            if (draggedItem) {
                if (draggedItem.type === 'note') {
                    if (targetType === 'folder') {
                        // 移动笔记到文件夹
                        const note = notes.find(n => n.id === draggedItem.id);
                        if (note) {
                            note.folderId = targetId;
                            saveNotes();
                            renderNoteList();
                        }
                    } else if (targetType === 'root') {
                        // 移动笔记到根目录
                        const note = notes.find(n => n.id === draggedItem.id);
                        if (note) {
                            note.folderId = null;
                            saveNotes();
                            renderNoteList();
                        }
                    }
                } else if (draggedItem.type === 'folder') {
                    if (targetType === 'folder') {
                        // 移动文件夹到另一个文件夹
                        const folder = folders.find(f => f.id === draggedItem.id);
                        if (folder && folder.id !== targetId) {
                            // 检查嵌套层级
                            if (checkNestedLevel(targetId) < 3) {
                                folder.parentId = targetId;
                                saveNotes();
                                renderNoteList();
                            } else {
                                alert('文件夹嵌套不能超过三层！');
                            }
                        }
                    } else if (targetType === 'root') {
                        // 移动文件夹到根目录
                        const folder = folders.find(f => f.id === draggedItem.id);
                        if (folder) {
                            folder.parentId = null;
                            saveNotes();
                            renderNoteList();
                        }
                    }
                }
                draggedItem = null;
            }
        }

        // 检查文件夹的嵌套层级

            let level = 0;
            let currentFolderId = folderId;
            while (currentFolderId) {
                const folder = folders.find(f => f.id === currentFolderId);
                if (folder) {
                    level++;
                    currentFolderId = folder.parentId;
                } else {
                    break;

            }

        // 生成单个笔记的 Markdown 内容
        function generateNoteMarkdown(note) {
            let content = `### ${note.name}\n\n`;
            content += `#### 证明过程\n${note.proof}\n\n`;
            
            if (note.references && note.references.length > 0) {
                content += `#### 引用的其他定理\n`;
                note.references.forEach(ref => {
                    content += `- ${ref}\n`;
                });
                content += `\n`;
            }
            
            return content;
        }

        // 解析 Markdown 内容
        function parseMarkdownContent(content) {
            console.log('开始解析 Markdown 内容...');
            const lines = content.split('\n');
            let currentFolder = null;
            let currentNote = null;
            let inProof = false;
            let inReferences = false;
            let lineCount = 0;

            lines.forEach(line => {
                lineCount++;
                const originalLine = line;
                line = line.trim();
                
                console.log(`处理第 ${lineCount} 行: "${originalLine}"`);
                
                // 处理文件夹标题
                if (line.startsWith('## ')) {
                    const folderName = line.substring(3).trim();
                    console.log(`发现文件夹标题: ${folderName}`);
                    if (folderName !== '根目录') {
                        // 查找或创建文件夹
                        currentFolder = folders.find(f => f.name === folderName);
                        if (!currentFolder) {
                            currentFolder = {
                                id: Date.now().toString(),
                                name: folderName,
                                parentId: null
                            };
                            folders.push(currentFolder);
                            console.log(`创建新文件夹: ${folderName}`);
                        } else {
                            console.log(`使用现有文件夹: ${folderName}`);
                        }
                    } else {
                        currentFolder = null;
                        console.log('切换到根目录');
                    }
                }
                // 处理笔记标题
                else if (line.startsWith('### ')) {
                    const noteName = line.substring(4).trim();
                    console.log(`发现笔记标题: ${noteName}`);
                    currentNote = {
                        id: Date.now().toString(),
                        name: noteName,
                        proof: '',
                        references: [],
                        folderId: currentFolder ? currentFolder.id : null
                    };
                    notes.push(currentNote);
                    console.log(`创建新笔记: ${noteName}, 文件夹: ${currentFolder ? currentFolder.name : '根目录'}`);
                    inProof = false;
                    inReferences = false;
                }
                // 处理证明过程
                else if (line.startsWith('#### 证明过程')) {
                    console.log('进入证明过程部分');
                    inProof = true;
                    inReferences = false;
                }
                // 处理引用的其他定理
                else if (line.startsWith('#### 引用的其他定理')) {
                    console.log('进入引用的其他定理部分');
                    inProof = false;
                    inReferences = true;
                }
                // 处理内容行
                else if (currentNote) {
                    if (inProof && line) {
                        currentNote.proof += line + '\n';
                        console.log(`添加证明内容: ${line.substring(0, 50)}...`);
                    } else if (inReferences && line.startsWith('- ')) {
                        const ref = line.substring(2).trim();
                        currentNote.references.push(ref);
                        console.log(`添加引用: ${ref}`);
                    }
                }
            });

            console.log('解析完成，共处理', lineCount, '行');
            console.log('创建/更新的笔记数量:', notes.length);
            console.log('创建/更新的文件夹数量:', folders.length);
            
            // 保存到本地存储

            console.log('重新渲染笔记列表');

                // 正确处理 UTF-8 编码
                const binaryString = atob(data.content);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decodedContent = new TextDecoder('utf-8').decode(bytes);
                console.log('解码后内容长度:', decodedContent.length);

        // 创建新文件
        async function createFile(filePath, content) {
            const url = `${GITHUB_API_URL}/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`;
            const token = getCurrentGitHubToken();
            
            if (!token) {
                throw new Error('GitHub Token 未设置');
            }
            
            // 正确处理 UTF-8 编码
            const encoder = new TextEncoder();
            const bytes = encoder.encode(content);
            let binaryString = '';
            for (let i = 0; i < bytes.length; i++) {
                binaryString += String.fromCharCode(bytes[i]);
            }
            const encodedContent = btoa(binaryString);
            
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: `添加笔记文件: ${filePath}`,
                    content: encodedContent
                })
            });
            
            if (response.status === 401) {
                // Token 无效或过期，清除本地 Token 并重新提示
                clearGitHubToken();
                const newToken = promptForGitHubToken();
                if (!newToken) {
                    throw new Error('GitHub Token 未设置');
                }
                // 重新尝试创建文件
                return createFile(filePath, content);
            }
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(`创建文件失败: ${error.message}`);
            }
        }

                // Token 无效或过期，清除本地 Token 并重新提示
                clearGitHubToken();
                const newToken = promptForGitHubToken();
                if (!newToken) {
                    throw new Error('GitHub Token 未设置');
                }
                // 重新尝试更新文件
                return updateFile(filePath, content);
            }
            
            if (!getResponse.ok) {
                throw new Error(`获取文件信息失败: ${getResponse.status}`);
            }
            
            const fileData = await getResponse.json();
            const sha = fileData.sha;
            
            // 正确处理 UTF-8 编码
            const encoder = new TextEncoder();
            const bytes = encoder.encode(content);
            let binaryString = '';
            for (let i = 0; i < bytes.length; i++) {
                binaryString += String.fromCharCode(bytes[i]);
            }
            const encodedContent = btoa(binaryString);
            
            // 然后更新文件
            const putResponse = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: `更新笔记文件: ${filePath}`,
                    content: encodedContent,
                    sha: sha
                })
            });
            
            if (putResponse.status === 401) {
                // Token 无效或过期，清除本地 Token 并重新提示
                clearGitHubToken();
                const newToken = promptForGitHubToken();
                if (!newToken) {
                    throw new Error('GitHub Token 未设置');
                }
                // 重新尝试更新文件
                return updateFile(filePath, content);
            }
            
            if (!putResponse.ok) {
                const error = await putResponse.json();
                throw new Error(`更新文件失败: ${error.message}`);
            }
        }

        // 初始化应用
        initApp();
    </script>
</body>
