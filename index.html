<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理科学习笔记 + 思维导图工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 250px;
            background-color: #2e3440;
            color: #eceff4;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #4c566a;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            padding: 10px;
            margin-bottom: 8px;
            background-color: #3b4252;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }

        .note-item:hover {
            background-color: #4c566a;
        }

        .note-item.active {
            background-color: #5e81ac;
        }

        .add-note-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #5e81ac;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .add-note-btn:hover {
            background-color: #81a1c1;
        }

        /* 主内容区样式 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: white;
        }

        .content-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #5e81ac;
            color: white;
        }

        .btn-primary:hover {
            background-color: #81a1c1;
        }

        .btn-danger {
            background-color: #bf616a;
            color: white;
        }

        .btn-danger:hover {
            background-color: #d08770;
        }

        /* 笔记编辑区样式 */
        .note-editor {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            min-height: 200px;
            font-family: inherit;
        }

        /* 思维导图容器样式 */
        .mindmap-container {
            flex: 1;
            position: relative;
            background-color: #f7f7f7;
            border-top: 1px solid #e0e0e0;
        }

        #mindmap {
            width: 100%;
            height: 100%;
        }

        /* 超链接样式 */
        .reference-link {
            color: #5e81ac;
            text-decoration: none;
            cursor: pointer;
        }

        .reference-link:hover {
            text-decoration: underline;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 4px;
            width: 80%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h1>理科学习笔记</h1>
            <ul class="note-list" id="noteList"></ul>
            <button class="add-note-btn" onclick="addNewNote()">添加新笔记</button>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title" id="contentTitle">选择笔记</h2>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="generateMindmap()">生成思维导图</button>
                    <button class="btn btn-danger" onclick="deleteCurrentNote()">删除笔记</button>
                </div>
            </div>

            <!-- 笔记编辑区 -->
            <div class="note-editor" id="noteEditor">
                <div id="emptyNoteMessage" style="display: flex; justify-content: center; align-items: center; height: 100%; font-size: 18px; color: #999;">
                    请选择笔记
                </div>
                <div id="noteForm" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="theoremName">定理/公理名称 *</label>
                        <input type="text" class="form-input" id="theoremName" placeholder="请输入定理/公理名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="proofProcess">证明过程 *</label>
                        <textarea class="form-textarea" id="proofProcess" placeholder="请输入证明过程"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="references">引用的其他定理（用逗号分隔）</label>
                        <input type="text" class="form-input" id="references" placeholder="例如：勾股定理, 三角形内角和定理">
                    </div>
                </div>
            </div>

            <!-- 思维导图容器 -->
            <div class="mindmap-container" id="mindmapContainer" style="display: none;">
                <div id="mindmap"></div>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">确认删除</h3>
                <button class="close-btn" onclick="closeDeleteModal()">&times;</button>
            </div>
            <p>确定要删除当前笔记吗？此操作不可恢复。</p>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDeleteNote()">删除</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>
        // 笔记数据存储
        let notes = [];
        let currentNoteId = null;
        let mindmapSvg = null;

        // 初始化应用
        function initApp() {
            loadNotes();
            renderNoteList();
            setupEventListeners();
        }

        // 从本地存储加载笔记
        function loadNotes() {
            const storedNotes = localStorage.getItem('scienceNotes');
            if (storedNotes) {
                console.log('Loaded from localStorage:', storedNotes);
                notes = JSON.parse(storedNotes);
                console.log('Parsed notes:', notes);
            }
        }

        // 保存笔记到本地存储
        function saveNotes() {
            localStorage.setItem('scienceNotes', JSON.stringify(notes));
        }

        // 渲染笔记列表
        function renderNoteList() {
            const noteList = document.getElementById('noteList');
            noteList.innerHTML = '';

            notes.forEach(note => {
                const li = document.createElement('li');
                li.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
                li.textContent = note.name;
                li.onclick = () => selectNote(note.id);
                noteList.appendChild(li);
            });
        }

        // 选择笔记
        function selectNote(noteId) {
            currentNoteId = noteId;
            const note = notes.find(n => n.id === noteId);
            if (note) {
                document.getElementById('contentTitle').textContent = note.name;
                document.getElementById('theoremName').value = note.name;
                document.getElementById('proofProcess').value = note.proof;
                document.getElementById('references').value = note.references.join(', ');
                // 显示表单，隐藏提示信息
                document.getElementById('emptyNoteMessage').style.display = 'none';
                document.getElementById('noteForm').style.display = 'block';
                renderNoteList();
                showEditor();
            }
        }

        // 添加新笔记
        function addNewNote() {
            const newNote = {
                id: Date.now().toString(),
                name: '新定理',
                proof: '',
                references: []
            };
            notes.push(newNote);
            saveNotes();
            // 显示表单，隐藏提示信息
            document.getElementById('emptyNoteMessage').style.display = 'none';
            document.getElementById('noteForm').style.display = 'block';
            selectNote(newNote.id);
        }

        // 删除当前笔记
        function deleteCurrentNote() {
            if (currentNoteId) {
                document.getElementById('deleteModal').style.display = 'block';
            }
        }

        // 确认删除笔记
        function confirmDeleteNote() {
            if (currentNoteId) {
                notes = notes.filter(note => note.id !== currentNoteId);
                saveNotes();
                currentNoteId = null;
                document.getElementById('contentTitle').textContent = '选择笔记';
                document.getElementById('theoremName').value = '';
                document.getElementById('proofProcess').value = '';
                document.getElementById('references').value = '';
                // 显示提示信息，隐藏表单
                document.getElementById('emptyNoteMessage').style.display = 'flex';
                document.getElementById('noteForm').style.display = 'none';
                renderNoteList();
                closeDeleteModal();
            }
        }

        // 关闭删除模态框
        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
        }

        // 生成思维导图
        function generateMindmap() {
            showMindmap();
            drawMindmap();
        }

        // 显示编辑区
        function showEditor() {
            document.getElementById('noteEditor').style.display = 'block';
            document.getElementById('mindmapContainer').style.display = 'none';
        }

        // 显示思维导图
        function showMindmap() {
            document.getElementById('noteEditor').style.display = 'none';
            document.getElementById('mindmapContainer').style.display = 'block';
        }

        // 绘制思维导图
        function drawMindmap() {
            const container = document.getElementById('mindmap');
            container.innerHTML = '';

            // 计算节点层级
            const nodeLevels = calculateNodeLevels();
            const maxLevel = Math.max(...Object.values(nodeLevels));

            // 设置画布尺寸
            const width = container.clientWidth;
            const height = container.clientHeight;
            const nodeWidth = 120;
            const nodeHeight = 60;
            const levelHeight = height / (maxLevel + 2);

            // 创建SVG
            mindmapSvg = d3.select('#mindmap')
                .append('svg')
                .attr('width', width)
                .attr('height', height);

            // 计算每个层级的节点位置
            const levelNodes = {};
            Object.entries(nodeLevels).forEach(([nodeId, level]) => {
                if (!levelNodes[level]) {
                    levelNodes[level] = [];
                }
                levelNodes[level].push(nodeId);
            });

            // 绘制连接线
            notes.forEach(note => {
                const sourceId = note.id;
                const sourceLevel = nodeLevels[sourceId];
                const sourceIndex = levelNodes[sourceLevel].indexOf(sourceId);
                const sourceX = (sourceIndex + 0.5) * (width / levelNodes[sourceLevel].length);
                // 调整Y坐标，使基础公理在底部，复杂定理在上方
                const sourceY = height - (sourceLevel * levelHeight + levelHeight / 2);

                note.references.forEach(refName => {
                    const targetNote = notes.find(n => n.name === refName);
                    if (targetNote) {
                        const targetId = targetNote.id;
                        const targetLevel = nodeLevels[targetId];
                        const targetIndex = levelNodes[targetLevel].indexOf(targetId);
                        const targetX = (targetIndex + 0.5) * (width / levelNodes[targetLevel].length);
                        // 调整Y坐标，使基础公理在底部，复杂定理在上方
                        const targetY = height - (targetLevel * levelHeight + levelHeight / 2);

                        // 使用曲线连接，更接近Obsidian风格
                        mindmapSvg.append('path')
                            .attr('d', `M ${sourceX} ${sourceY} C ${sourceX} ${(sourceY + targetY) / 2}, ${targetX} ${(sourceY + targetY) / 2}, ${targetX} ${targetY}`)
                            .attr('stroke', '#999')
                            .attr('stroke-width', 1.5)
                            .attr('fill', 'none');
                    }
                });
            });

            // 绘制节点
            notes.forEach(note => {
                const nodeId = note.id;
                const level = nodeLevels[note.id];
                const index = levelNodes[level].indexOf(nodeId);
                const x = (index + 0.5) * (width / levelNodes[level].length);
                // 调整Y坐标，使基础公理在底部，复杂定理在上方
                const y = height - (level * levelHeight + levelHeight / 2);

                // 节点背景 - 更接近Obsidian风格
                mindmapSvg.append('rect')
                    .attr('x', x - nodeWidth / 2)
                    .attr('y', y - nodeHeight / 2)
                    .attr('width', nodeWidth)
                    .attr('height', nodeHeight)
                    .attr('rx', 6)
                    .attr('ry', 6)
                    .attr('fill', '#3b4252')
                    .attr('stroke', '#5e81ac')
                    .attr('stroke-width', 1.5);

                // 节点文本 - 确保正确显示
                mindmapSvg.append('text')
                    .attr('x', x)
                    .attr('y', y)
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'middle')
                    .attr('fill', '#eceff4')
                    .attr('font-size', '12px')
                    .attr('font-weight', '500')
                    .text(note.name)
                    .call(wrapText, nodeWidth - 20);

                // 添加点击事件
                mindmapSvg.append('rect')
                    .attr('x', x - nodeWidth / 2)
                    .attr('y', y - nodeHeight / 2)
                    .attr('width', nodeWidth)
                    .attr('height', nodeHeight)
                    .attr('fill', 'transparent')
                    .style('cursor', 'pointer')
                    .on('click', () => selectNote(nodeId));
            });
        }

        // 计算节点层级
        function calculateNodeLevels() {
            const levels = {};
            const visited = new Set();

            // 递归计算层级
            function calculateLevel(noteId) {
                if (visited.has(noteId)) {
                    return levels[noteId];
                }

                const note = notes.find(n => n.id === noteId);
                if (!note) return 0;

                let maxChildLevel = 0;
                console.log('Processing note:', note.name, 'with references:', note.references);
                note.references.forEach(refName => {
                    const refNote = notes.find(n => n.name === refName);
                    console.log('Looking for ref:', refName, 'found:', refNote ? refNote.name : 'not found');
                    if (refNote) {
                        const childLevel = calculateLevel(refNote.id);
                        console.log('Child level for', refName, 'is', childLevel);
                        maxChildLevel = Math.max(maxChildLevel, childLevel);
                    }
                });

                levels[noteId] = maxChildLevel + 1;
                console.log('Level for', note.name, 'is', levels[noteId]);
                visited.add(noteId);
                return levels[noteId];
            }

            // 计算所有节点的层级
            notes.forEach(note => {
                if (!visited.has(note.id)) {
                    calculateLevel(note.id);
                }
            });

            console.log('Final node levels:', levels);
            return levels;
        }

        // 文本换行
        function wrapText(text, width) {
            text.each(function() {
                const text = d3.select(this);
                const words = text.text().split(/\s+/).reverse();
                let word;
                let line = [];
                let lineNumber = 0;
                const lineHeight = 1.2;
                const y = text.attr('y');
                const x = text.attr('x'); // 获取父元素的x坐标
                const dy = parseFloat(text.attr('dy') || 0);
                let tspan = text.text(null).append('tspan').attr('x', x).attr('y', y).attr('dy', dy + 'em');

                while (word = words.pop()) {
                    line.push(word);
                    tspan.text(line.join(' '));
                    if (tspan.node().getComputedTextLength() > width) {
                        line.pop();
                        tspan.text(line.join(' '));
                        line = [word];
                        tspan = text.append('tspan').attr('x', x).attr('y', y).attr('dy', ++lineNumber * lineHeight + dy + 'em').text(word);
                    }
                }
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 自动保存笔记
            const theoremNameInput = document.getElementById('theoremName');
            const proofProcessInput = document.getElementById('proofProcess');
            const referencesInput = document.getElementById('references');

            function saveCurrentNote() {
                if (currentNoteId) {
                    const note = notes.find(n => n.id === currentNoteId);
                    if (note) {
                        note.name = theoremNameInput.value;
                        note.proof = proofProcessInput.value;
                        // 调试：查看输入值
                        console.log('References input:', referencesInput.value);
                        // 分割引用 - 处理中文和英文逗号
                        note.references = referencesInput.value.split(/[,，]/).map(r => r.trim()).filter(r => r);
                        console.log('Split references:', note.references);
                        saveNotes();
                        renderNoteList();
                    }
                }
            }

            theoremNameInput.addEventListener('input', saveCurrentNote);
            proofProcessInput.addEventListener('input', saveCurrentNote);
            referencesInput.addEventListener('input', saveCurrentNote);

            // 渲染证明过程中的引用链接
            proofProcessInput.addEventListener('input', renderProofReferences);
        }

        // 渲染证明过程中的引用链接
        function renderProofReferences() {
            const proofProcess = document.getElementById('proofProcess');
            const proofText = proofProcess.value;
            
            // 简单的引用检测和链接生成（这里只是示例，实际应用中可能需要更复杂的解析）
            let renderedText = proofText;
            notes.forEach(note => {
                const regex = new RegExp(`\\b${note.name}\\b`, 'g');
                renderedText = renderedText.replace(regex, `<span class="reference-link" onclick="navigateToReference('${note.name}')">${note.name}</span>`);
            });

            // 注意：这里只是演示，实际应用中需要更复杂的处理
        }

        // 导航到引用的定理
        function navigateToReference(theoremName) {
            const note = notes.find(n => n.name === theoremName);
            if (note) {
                selectNote(note.id);
            }
        }

        // 初始化应用
        initApp();
    </script>
</body>
</html>
